<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Rose & Stem</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config={
darkMode:'class',
theme:{
extend:{
colors:{
accent:'#f43f5e',
primary:'#0f172a'
}
}
}
}
</script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center min-h-screen">

<button id="themeToggle"
class="absolute top-6 right-6 text-xl">
🌙
</button>

<div class="w-full max-w-md">

<div class="text-center mb-8">

<img src="../images/logo.svg"
class="h-16 mx-auto mb-4 dark:invert">

<h1 class="text-2xl font-bold">
<span class="text-accent">Rose</span> & Stem
</h1>

<p class="text-gray-500 dark:text-gray-400 text-sm">
Create your floral account
</p>

</div>

<div class="bg-white dark:bg-gray-800 shadow-xl rounded-3xl p-10">

<h2 class="text-2xl font-bold mb-6 text-center">
Register
</h2>

<form class="space-y-6">

<div>
<label>Name</label>
<input
type="text"
required
class="w-full mt-2 px-4 py-3 rounded-xl border
dark:border-gray-600 bg-transparent
focus:ring-2 focus:ring-accent outline-none">
</div>

<div>
<label>Email</label>
<input
type="email"
required
class="w-full mt-2 px-4 py-3 rounded-xl border
dark:border-gray-600 bg-transparent
focus:ring-2 focus:ring-accent outline-none">
</div>

<div>
<label>Password</label>
<input
type="password"
required
class="w-full mt-2 px-4 py-3 rounded-xl border
dark:border-gray-600 bg-transparent
focus:ring-2 focus:ring-accent outline-none">
</div>

<button
class="w-full bg-accent text-white py-3 rounded-xl font-semibold
hover:opacity-90 transition">
Create Account
</button>

</form>

<div class="text-center mt-6 text-sm">

Already have an account?

<a href="login.html"
class="text-accent font-semibold">
Login
</a>

</div>

</div>

</div>

<script>

const html=document.documentElement
const toggle=document.getElementById("themeToggle")

if(localStorage.getItem("theme")==="dark"){
html.classList.add("dark")
toggle.textContent="☀️"
}

toggle.onclick=()=>{
html.classList.toggle("dark")

localStorage.setItem(
"theme",
html.classList.contains("dark")?"dark":"light"
)

toggle.textContent=
html.classList.contains("dark")?"☀️":"🌙"
}

</script>

</body>
</html>
