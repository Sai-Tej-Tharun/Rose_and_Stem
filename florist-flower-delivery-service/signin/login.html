<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Rose & Stem</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
darkMode:'class',
theme:{
extend:{
colors:{
accent:'#f43f5e',
primary:'#0f172a'
}
}
}
}
</script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center min-h-screen transition">


<button id="themeToggle"
class="absolute top-6 right-6 text-xl">
🌙
</button>

<div class="w-full max-w-md">


<div class="text-center mb-8">

<img src="../images/logo.svg"
class="h-16 mx-auto mb-4 dark:invert">

<h1 class="text-2xl font-bold">
<span class="text-accent">Rose</span> & Stem
</h1>

<p class="text-gray-500 dark:text-gray-400 text-sm">
Welcome back to your floral dashboard
</p>

</div>


<div class="bg-white dark:bg-gray-800 shadow-xl rounded-3xl p-10">

<h2 class="text-2xl font-bold mb-6 text-center">
Login
</h2>

<form id="loginForm" class="space-y-6">


<div>
<label class="text-sm">Email</label>
<input
type="email"
id="email"
required
class="w-full mt-2 px-4 py-3 rounded-xl border border-gray-300
dark:border-gray-600
bg-transparent focus:ring-2 focus:ring-accent outline-none"
/>
</div>


<div class="relative">

<label class="text-sm">Password</label>

<input
type="password"
id="password"
required
class="w-full mt-2 px-4 py-3 rounded-xl border border-gray-300
dark:border-gray-600
bg-transparent focus:ring-2 focus:ring-accent outline-none"
/>

<button type="button"
id="togglePassword"
class="absolute right-4 top-10">
👁
</button>


<div class="h-1 bg-gray-200 mt-2 rounded">
<div id="strengthBar" class="h-1 w-0 rounded"></div>
</div>

</div>


<div class="flex justify-between text-sm">

<label class="flex gap-2">
<input type="checkbox">
Remember me
</label>

<a href="#" class="text-accent">
Forgot password?
</a>

</div>


<button
type="submit"
id="loginBtn"
class="w-full bg-accent text-white py-3 rounded-xl font-semibold
hover:opacity-90 transition">
Login
</button>

</form>


<div class="text-center mt-6 text-sm">
Don't have an account?

<a href="register.html"
class="text-accent font-semibold">
Create Account
</a>

</div>

</div>

</div>

<script>



const html=document.documentElement
const toggle=document.getElementById("themeToggle")

if(localStorage.getItem("theme")==="dark"){
html.classList.add("dark")
toggle.textContent="☀️"
}

toggle.onclick=()=>{
html.classList.toggle("dark")
localStorage.setItem(
"theme",
html.classList.contains("dark")?"dark":"light"
)
toggle.textContent=
html.classList.contains("dark")?"☀️":"🌙"
}



const password=document.getElementById("password")
const togglePass=document.getElementById("togglePassword")

togglePass.onclick=()=>{
if(password.type==="password"){
password.type="text"
togglePass.textContent="🙈"
}else{
password.type="password"
togglePass.textContent="👁"
}
}



const strengthBar=document.getElementById("strengthBar")

password.addEventListener("input",()=>{

let val=password.value
let strength=0

if(val.length>6)strength++
if(/[A-Z]/.test(val))strength++
if(/[0-9]/.test(val))strength++
if(/[@$!%*?&]/.test(val))strength++

const colors=["red","orange","gold","green"]
const widths=["25%","50%","75%","100%"]

if(val.length===0){
strengthBar.style.width="0"
}else{
strengthBar.style.width=widths[strength-1]||"25%"
strengthBar.style.background=colors[strength-1]||"red"
}

})



document.getElementById("loginForm")
.addEventListener("submit",(e)=>{

e.preventDefault()

alert("Login Successful 🌹")

})

</script>

</body>
</html>
